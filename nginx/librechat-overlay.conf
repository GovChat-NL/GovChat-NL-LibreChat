map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream librechat_upstream {
  server librechat:3080;
}

server {
  listen 3080;
  server_name _;
  # Verhoog uploadlimiet om 413 op /api/files/images te voorkomen.
  client_max_body_size 25m;

  # n8n webhook endpoint voor Versimpelaar (alleen webhook, geen editor UI)
  # Externe route /n8n/webhook/* wordt intern herschreven naar /webhook/*
  location ^~ /n8n/webhook/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_pass http://n8n:5678/webhook/;
  }

  # Blokkeer alle overige n8n routes (hardening)
  location ^~ /n8n/ {
    return 404;
  }

  # GovChat overlay static assets gepubliceerd door govchat-overlay-admin
  location /govchat-overlay/ {
    alias /opt/librechat/overlay/publish/;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri =404;
  }

  # Asynchrone image-jobs API (submit + status polling)
  location ^~ /govchat-api/image-jobs {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://govchat-overlay-admin:3002/api/image-jobs;
  }

  # Realtime STT bridge (WebSocket upgrade)
  location ^~ /govchat-api/realtime-stt {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://govchat-overlay-admin:3002/api/realtime-stt;
  }

  # Transcript sessions API (trusted backend, user-linked via LibreChat cookies)
  location ^~ /govchat-api/transcript-sessions {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
    proxy_pass http://govchat-overlay-admin:3002/api/transcript-sessions;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Vereist voor HTML-injectie via sub_filter
    proxy_set_header Accept-Encoding "";

    proxy_pass http://librechat_upstream;

    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '</head>' '<link rel="stylesheet" href="/govchat-overlay/custom.css?v=20260710-hist1"/><script defer src="/govchat-overlay/loader.js?v=20260710-hist1"></script></head>';
  }
}

