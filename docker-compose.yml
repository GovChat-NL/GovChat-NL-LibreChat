services:

  # ---------------------------------------------------------------------------
  #  LibreChat - Hoofdapplicatie
  #  Image: stable release (niet -dev)
  #  Registry: registry.librechat.ai (officieel, ghcr.io is verouderd)
  #
  #  Vereist op host (via SSH, eenmalig):
  #    mkdir -p /opt/librechat/{data/mongodb,data/meilisearch,data/pgvector,data/redis,uploads,logs,images,overlay/data,overlay/publish}
  #    Standaard configuratiebestand staat in deze repo: ./librechat.yaml
  # ---------------------------------------------------------------------------
  librechat:
    image: registry.librechat.ai/danny-avila/librechat:v0.8.5
    container_name: librechat
    restart: unless-stopped
    expose:
      - "3080"
    depends_on:
      mongodb:
        condition: service_healthy
      meilisearch:
        condition: service_started
      litellm:
        condition: service_healthy
      n8n-openai-bridge:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${LIBRECHAT_CONFIG_PATH:-./librechat.yaml}:/app/librechat.yaml:ro
      - /opt/librechat/uploads:/app/uploads
      - /opt/librechat/logs:/app/api/logs
      - /opt/librechat/images:/app/client/public/images
    environment:
      # --- Applicatie ---
      APP_TITLE: ${APP_TITLE:-GovChat-NL}
      HOST: 0.0.0.0
      PORT: "3080"
      NODE_ENV: production
      ENDPOINTS: ${ENDPOINTS:-custom}
      DOMAIN_CLIENT: ${PUBLIC_BASE_URL}
      DOMAIN_SERVER: ${PUBLIC_BASE_URL}
      TRUST_PROXY: "1"

      # --- MongoDB ---
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASS}@mongodb:27017/LibreChat?authSource=admin

      # --- Redis (sessies + caching) ---
      USE_REDIS: "true"
      REDIS_URI: redis://redis:6379

      # --- JWT tokens ---
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      # --- Credential encryptie ---
      CREDS_KEY: ${CREDS_KEY}
      CREDS_IV: ${CREDS_IV}
      SESSION_SECRET: ${SESSION_SECRET}

      # --- Registratie en login ---
      ALLOW_REGISTRATION: "true"
      ALLOW_EMAIL_LOGIN: "true"
      ALLOW_SOCIAL_LOGIN: "true"
      ALLOW_SOCIAL_REGISTRATION: "true"
      ALLOW_UNVERIFIED_EMAIL_LOGIN: "true"

      # --- Entra ID SSO (OpenID Connect) ---
      OPENID_CLIENT_ID: ${OPENID_CLIENT_ID}
      OPENID_CLIENT_SECRET: ${OPENID_CLIENT_SECRET}
      OPENID_ISSUER: https://login.microsoftonline.com/${ENTRA_TENANT_ID}/v2.0/
      OPENID_SESSION_SECRET: ${OPENID_SESSION_SECRET}
      OPENID_SCOPE: api://eb01ffc3-f8e3-4945-84dd-157ac2de8c34/.default openid profile email offline_access
      OPENID_CALLBACK_URL: /oauth/openid/callback
      OPENID_BUTTON_LABEL: Inloggen met Microsoft
      OPENID_USE_END_SESSION_ENDPOINT: "true"
      DEBUG_OPENID_REQUESTS: "true"
      OPENID_GENERATE_NONCE: "true"


      # --- Token reuse (verplicht voor Entra ID groepssync) ---
      OPENID_REUSE_TOKENS: "true"

      # --- Toegangsbeperking via Entra ID app-rol ---
      OPENID_REQUIRED_ROLE_TOKEN_KIND: id
      OPENID_REQUIRED_ROLE_PARAMETER_PATH: roles
      OPENID_REQUIRED_ROLE: ${OPENID_REQUIRED_ROLE}

      # Caching Configuration
      OPENID_JWKS_URL_CACHE_ENABLED: "true"
      OPENID_JWKS_URL_CACHE_TIME: "600000"  # 10 minutes in milliseconds
 
      # Azure-specific Configuration
      OPENID_ON_BEHALF_FLOW_FOR_USERINFO_REQUIRED: "true"
      OPENID_ON_BEHALF_FLOW_USERINFO_SCOPE: "user.read"


      # --- Microsoft Graph API (groepssync + people search) ---
      USE_ENTRA_ID_FOR_PEOPLE_SEARCH: "true"
      ENTRA_ID_INCLUDE_OWNERS_AS_MEMBERS: "true"
      OPENID_GRAPH_SCOPES: "User.Read,GroupMember.Read.All,People.Read,User.ReadBasic.All offline_access"

      # --- MeiliSearch ---
      SEARCH: "true"
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}

      # --- RAG API ---
      RAG_API_URL: ${RAG_API_URL:-}

      # --- LiteLLM (externe AI gateway) ---
      # Beide nodig: API_KEY voor directe auth, URL voor librechat.yaml ${LITELLM_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_URL: ${LITELLM_URL}
      N8N_OPENAI_BRIDGE_BEARER_TOKEN: ${N8N_OPENAI_BRIDGE_BEARER_TOKEN}

      # --- Admin Panel callback URL voor SSO ---
      ADMIN_PANEL_URL: ${ADMIN_PANEL_PUBLIC_URL}

      # --- Logging ---
      DEBUG_LOGGING: "true"
      DEBUG_CONSOLE: "true"

      # --- Email (uitgeschakeld) ---
      EMAIL_SERVICE: ""

    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  Dev-only seeder voor eerste LibreChat admin user
  #  - Alleen actief als DEV_SEED_ADMIN_ENABLED=true
  #  - Verwacht lege user-collectie (eerste registratie wordt admin)
  # ---------------------------------------------------------------------------
  librechat-seed-admin:
    image: curlimages/curl:8.9.1
    container_name: librechat-seed-admin
    restart: "no"
    depends_on:
      librechat:
        condition: service_started
    environment:
      LIBRECHAT_BASE_URL: http://librechat:3080
      DEV_SEED_ADMIN_ENABLED: ${DEV_SEED_ADMIN_ENABLED:-false}
      DEV_SEED_ADMIN_NAME: ${DEV_SEED_ADMIN_NAME:-Local Admin}
      DEV_SEED_ADMIN_EMAIL: ${DEV_SEED_ADMIN_EMAIL:-admin@local.test}
      DEV_SEED_ADMIN_PASSWORD: ${DEV_SEED_ADMIN_PASSWORD:-ChangeMe!123}
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -e

        if [ "$${DEV_SEED_ADMIN_ENABLED}" != "true" ]; then
          echo "DEV_SEED_ADMIN_ENABLED=false; seeder wordt overgeslagen"
          exit 0
        fi

        echo "Wachten op LibreChat..."
        i=0
        until [ $${i} -ge 60 ]; do
          if curl -fsS "$${LIBRECHAT_BASE_URL}/" >/dev/null 2>&1; then
            break
          fi
          i=$$((i+1))
          sleep 2
        done

        if [ $${i} -ge 60 ]; then
          echo "LibreChat niet bereikbaar binnen timeout"
          exit 1
        fi

        echo "Probeer admin gebruiker te registreren (dev-only)..."

        RESPONSE=$$(curl -sS -X POST "$${LIBRECHAT_BASE_URL}/api/auth/register" \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"$${DEV_SEED_ADMIN_NAME}\",\"email\":\"$${DEV_SEED_ADMIN_EMAIL}\",\"password\":\"$${DEV_SEED_ADMIN_PASSWORD}\",\"confirm_password\":\"$${DEV_SEED_ADMIN_PASSWORD}\"}" || true)

        echo "$${RESPONSE}" | grep -Eiq "already|exists|duplicate|succes|success" && {
          echo "Seeder gereed (account bestaat al of registratie gelukt)"
          exit 0
        }

        echo "$${RESPONSE}" | grep -Eiq "error|invalid|failed" && {
          echo "Eerste registratiepoging gaf fout; probeer alternatief payload-formaat"
        }

        RESPONSE2=$$(curl -sS -X POST "$${LIBRECHAT_BASE_URL}/api/auth/register" \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"$${DEV_SEED_ADMIN_NAME}\",\"email\":\"$${DEV_SEED_ADMIN_EMAIL}\",\"password\":\"$${DEV_SEED_ADMIN_PASSWORD}\",\"confirmPassword\":\"$${DEV_SEED_ADMIN_PASSWORD}\"}" || true)

        echo "$${RESPONSE2}" | grep -Eiq "already|exists|duplicate|succes|success" && {
          echo "Seeder gereed (account bestaat al of registratie gelukt)"
          exit 0
        }

        echo "Seeder kon user niet automatisch registreren. Response: $${RESPONSE2}"
        exit 1
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  LibreChat reverse proxy
  #  - Serveert de app publiek op :3080
  #  - Injecteert GovChat overlay assets (help + app launcher) in HTML
  # ---------------------------------------------------------------------------
  librechat-proxy:
    image: nginx:1.27-alpine
    container_name: librechat-proxy
    restart: unless-stopped
    depends_on:
      librechat:
        condition: service_started
    ports:
      - "${LC_PORT:-3080}:3080"
    volumes:
      - ./nginx/librechat-overlay.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/librechat/overlay/publish:/opt/librechat/overlay/publish:ro
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  MongoDB 8.0.20 - Gesprekken, gebruikers, agents, presets
  #  Gepinde versie conform officieel LibreChat docker-compose
  #  Poort open voor n8n (andere VM). Auth via MONGO_ROOT_USER/PASS.
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:8.0.20
    container_name: librechat-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - /opt/librechat/data/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: LibreChat
    command: mongod --quiet
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  Redis 7 - Sessie-opslag en caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: librechat-redis
    restart: unless-stopped
    volumes:
      - /opt/librechat/data/redis:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  MeiliSearch v1.35.1 - Full-text zoeken in conversatiegeschiedenis
  #  Versie conform officieel LibreChat docker-compose
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.35.1
    container_name: librechat-meilisearch
    restart: unless-stopped
    volumes:
      - /opt/librechat/data/meilisearch:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  LiteLLM PostgreSQL - opslag voor LiteLLM modellen/sleutels/logs
  # ---------------------------------------------------------------------------
  litellm-postgres:
    image: postgres:16-alpine
    container_name: librechat-litellm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD}
    volumes:
      - /opt/librechat/data/litellm-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  LiteLLM - modelrouter/proxy
  #  Secrets/keys komen direct uit .env
  # ---------------------------------------------------------------------------
  litellm:
    image: docker.litellm.ai/berriai/litellm-database:main-stable
    container_name: librechat-litellm
    restart: unless-stopped
    depends_on:
      litellm-postgres:
        condition: service_healthy
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_POSTGRES_PASSWORD}@litellm-postgres:5432/litellm
      DATABASE_CONNECTION_POOL_LIMIT: ${LITELLM_DB_POOL_LIMIT:-10}
      DATABASE_CONNECTION_TIMEOUT: ${LITELLM_DB_TIMEOUT:-30}
      STORE_MODEL_IN_DB: "True"
      AZURE_OPENAI_API_BASE: ${AZURE_OPENAI_API_BASE}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      UI_USERNAME: ${LITELLM_UI_USERNAME}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD}
      LITELLM_LOG: ${LITELLM_LOG_LEVEL:-WARNING}
    volumes:
      - ${LITELLM_CONFIG_PATH:-./litellm/config.yaml}:/app/config.yaml:ro
    command:
      - "--port"
      - "4000"
      - "--num_workers"
      - "${LITELLM_NUM_WORKERS:-1}"
      - "--config"
      - "/app/config.yaml"
      - "--drop_params"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  n8n PostgreSQL - workflow metadata + execution storage
  # ---------------------------------------------------------------------------
  n8n-postgres:
    image: postgres:16-alpine
    container_name: librechat-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD}
    volumes:
      - n8n-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  n8n - workflow engine (niet publiek geëxposed)
  #  - Versimpelaar webhook draait hierop
  #  - Alleen webhook route wordt via nginx geproxied
  # ---------------------------------------------------------------------------
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.25.7}
    container_name: librechat-n8n
    restart: unless-stopped
    depends_on:
      n8n-postgres:
        condition: service_healthy
      litellm:
        condition: service_healthy
    ports:
      - "5678:5678"
    expose:
      - "5678"
      - "5679"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}

      # Security hardening
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}

      # Runtime
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_HOST: localhost
      N8N_PATH: /
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: ${TZ:-Europe/Amsterdam}
      TZ: ${TZ:-Europe/Amsterdam}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-warn}
      N8N_PUBLIC_API_DISABLED: "true"
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: "true"
      # Nodig voor Code node gebruik van $env.* in external runners mode
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_RUNNERS_MODE: external
      N8N_RUNNERS_TASK_REQUEST_TIMEOUT: ${N8N_RUNNERS_TASK_REQUEST_TIMEOUT:-120}
      N8N_RUNNERS_GRANT_TOKEN_TTL: ${N8N_RUNNERS_GRANT_TOKEN_TTL:-120}
      N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}

      # LLM target + webhook shared secret
      LITELLM_URL: ${LITELLM_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      N8N_ENABLE_IMAGE_TOOL: ${N8N_ENABLE_IMAGE_TOOL:-false}
      N8N_LITELLM_IMAGE_BASE_URL: ${N8N_LITELLM_IMAGE_BASE_URL:-${LITELLM_URL}}
      N8N_LITELLM_IMAGE_API_KEY: ${N8N_LITELLM_IMAGE_API_KEY:-${LITELLM_API_KEY}}
      N8N_LITELLM_IMAGE_MODEL: ${N8N_LITELLM_IMAGE_MODEL:-gpt-image-1}
      N8N_WEBHOOK_TOKEN: ${N8N_WEBHOOK_TOKEN}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/bootstrap:/bootstrap:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5678/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  n8n external task runners (vereist voor production-safe code execution)
  # ---------------------------------------------------------------------------
  n8n-runners:
    image: n8nio/runners:${N8N_VERSION:-2.25.7}
    container_name: librechat-n8n-runners
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n:5679
      N8N_RUNNERS_AUTH_TOKEN: ${N8N_RUNNERS_AUTH_TOKEN}
      # Nodig voor Code node gebruik van $env.* in runner context
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      LITELLM_URL: ${LITELLM_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      N8N_ENABLE_IMAGE_TOOL: ${N8N_ENABLE_IMAGE_TOOL:-false}
      N8N_LITELLM_IMAGE_BASE_URL: ${N8N_LITELLM_IMAGE_BASE_URL:-${LITELLM_URL}}
      N8N_LITELLM_IMAGE_API_KEY: ${N8N_LITELLM_IMAGE_API_KEY:-${LITELLM_API_KEY}}
      N8N_LITELLM_IMAGE_MODEL: ${N8N_LITELLM_IMAGE_MODEL:-gpt-image-1}
      N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT: "30"
      N8N_RUNNERS_LAUNCHER_LOG_LEVEL: warn
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  n8n bootstrap - importeert workflows uit GovChat-NL-Agents (GitHub)
  # ---------------------------------------------------------------------------
  n8n-bootstrap:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.25.7}
    container_name: librechat-n8n-bootstrap
    restart: "no"
    depends_on:
      n8n:
        condition: service_healthy
      n8n-runners:
        condition: service_started
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_WEBHOOK_TOKEN: ${N8N_WEBHOOK_TOKEN}
      LITELLM_URL: ${LITELLM_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      AGENTS_WORKFLOW_SOURCE: ${AGENTS_WORKFLOW_SOURCE:-github}
      AGENTS_RAW_BASE_URL: ${AGENTS_RAW_BASE_URL:-https://raw.githubusercontent.com/GovChat-NL/GovChat-NL-Agents/main/n8n/workflows}
      AGENTS_WORKFLOW_FILES: ${AGENTS_WORKFLOW_FILES:-versimpelaar-litellm.json,orchestrator-litellm.json,image-generator-litellm.json}
      AGENTS_LOCAL_WORKFLOWS_DIR: ${AGENTS_LOCAL_WORKFLOWS_DIR:-/workspace/GovChat-NL-Agents/n8n/workflows}
      AGENTS_BOOTSTRAP_FORCE: ${AGENTS_BOOTSTRAP_FORCE:-false}
    volumes:
      - n8n-data:/home/node/.n8n
      - ../GovChat-NL-Agents:/workspace/GovChat-NL-Agents:ro
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - |
        set -e

        if [ -z "$${LITELLM_API_KEY}" ]; then
          echo "LITELLM_API_KEY ontbreekt; kan n8n credential niet bootstrap'en"
          exit 1
        fi

        if [ -z "$${LITELLM_URL}" ]; then
          echo "LITELLM_URL ontbreekt; kan n8n credential niet bootstrap'en"
          exit 1
        fi

        cat > /tmp/litellm-openai-credential.json <<EOF
        [
          {
            "id": "00000000-0000-4000-8000-000000000111",
            "name": "LiteLLM API",
            "type": "openAiApi",
            "data": {
              "apiKey": "$${LITELLM_API_KEY}",
              "url": "$${LITELLM_URL%/}/v1"
            }
          }
        ]
        EOF

        n8n import:credentials --input=/tmp/litellm-openai-credential.json

        mkdir -p /tmp/agents/workflows

        node - <<'NODE'
        const fs = require('fs');
        const path = require('path');

        const source = String(process.env.AGENTS_WORKFLOW_SOURCE || 'github').trim().toLowerCase();
        const base = String(process.env.AGENTS_RAW_BASE_URL || '').replace(/\/$/, '');
        const files = String(process.env.AGENTS_WORKFLOW_FILES || '')
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        const localDir = String(process.env.AGENTS_LOCAL_WORKFLOWS_DIR || '/workspace/GovChat-NL-Agents/n8n/workflows').trim();

        if (!files.length) throw new Error('AGENTS_WORKFLOW_FILES bevat geen workflow-bestanden');

        const outDir = '/tmp/agents/workflows';

        async function download(fileName) {
          const url = base + '/' + fileName;
          const res = await fetch(url, { method: 'GET' });
          if (!res.ok) throw new Error('Download mislukt (' + res.status + ') voor ' + url);
          const body = await res.text();
          const out = path.join(outDir, fileName);
          fs.writeFileSync(out, body, 'utf8');
          console.log('Downloaded ' + fileName);
        }

        function copyLocal(fileName) {
          const sourcePath = path.join(localDir, fileName);
          if (!fs.existsSync(sourcePath)) {
            throw new Error('Lokaal workflow-bestand niet gevonden: ' + sourcePath);
          }
          const body = fs.readFileSync(sourcePath, 'utf8');
          const out = path.join(outDir, fileName);
          fs.writeFileSync(out, body, 'utf8');
          console.log('Copied local ' + fileName);
        }

        (async () => {
          if (source === 'local') {
            for (const file of files) {
              copyLocal(file);
            }
            return;
          }

          if (!base) throw new Error('AGENTS_RAW_BASE_URL ontbreekt');
          for (const file of files) {
            await download(file);
          }
        })().catch((err) => {
          console.error(err);
          process.exit(1);
        });
        NODE

        if [ -f /home/node/.n8n/.govchat-seeded-v4 ]; then
          echo "n8n workflows already seeded (v4)"
        else
          echo "Seeding/updating workflows to v4"
          touch /home/node/.n8n/.govchat-seeded-v4
        fi

        FORCE="$(printf '%s' "$${AGENTS_BOOTSTRAP_FORCE:-false}" | tr '[:upper:]' '[:lower:]')"
        if [ "$${FORCE}" = "true" ] || [ ! -f /home/node/.n8n/.govchat-seeded-v4 ]; then
          echo "Import/publish workflows (force=$${FORCE})"
          n8n import:workflow --input=/tmp/agents/workflows/versimpelaar-litellm.json
          n8n import:workflow --input=/tmp/agents/workflows/orchestrator-litellm.json
          n8n import:workflow --input=/tmp/agents/workflows/image-generator-litellm.json
          n8n publish:workflow --id=govchat-versimpelaar-b1-litellm || true
          n8n publish:workflow --id=govchat-orchestrator-litellm || true
          n8n publish:workflow --id=govchat-image-generator-litellm || true
          touch /home/node/.n8n/.govchat-seeded-v4
        else
          echo "Skip import/publish (already seeded; set AGENTS_BOOTSTRAP_FORCE=true to force)"
        fi
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  n8n OpenAI Bridge - OpenAI-compatibele laag tussen LibreChat en n8n
  # ---------------------------------------------------------------------------
  n8n-openai-bridge:
    build:
      context: ../n8n-openai-bridge
      dockerfile: docker/Dockerfile.build
    image: n8n-openai-bridge:local
    container_name: n8n-openai-bridge
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    expose:
      - "3333"
    environment:
      PORT: "3333"
      BEARER_TOKEN: ${N8N_OPENAI_BRIDGE_BEARER_TOKEN}
      N8N_WEBHOOK_BEARER_TOKEN: ${N8N_WEBHOOK_TOKEN}
      MODEL_LOADER_TYPE: file
      MODELS_CONFIG_FILE: /app/models.json
      LOG_REQUESTS: ${N8N_OPENAI_BRIDGE_LOG_REQUESTS:-false}
      ENABLE_TASK_DETECTION: ${N8N_OPENAI_BRIDGE_ENABLE_TASK_DETECTION:-false}
      SESSION_ID_HEADERS: ${N8N_OPENAI_BRIDGE_SESSION_ID_HEADERS:-X-Session-Id,X-Chat-Id,X-OpenWebUI-Chat-Id}
      USER_ID_HEADERS: ${N8N_OPENAI_BRIDGE_USER_ID_HEADERS:-X-User-Id,X-OpenWebUI-User-Id}
      USER_EMAIL_HEADERS: ${N8N_OPENAI_BRIDGE_USER_EMAIL_HEADERS:-X-User-Email,X-OpenWebUI-User-Email}
      USER_NAME_HEADERS: ${N8N_OPENAI_BRIDGE_USER_NAME_HEADERS:-X-User-Name,X-OpenWebUI-User-Name}
      USER_ROLE_HEADERS: ${N8N_OPENAI_BRIDGE_USER_ROLE_HEADERS:-X-User-Role,X-OpenWebUI-User-Role}
    volumes:
      - ./n8n-openai-bridge/models.json:/app/models.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  pgvector 0.8.0 (pg16) - Vector extensie voor RAG embeddings
  #  pg16 omdat de data directory al geinitialiseerd is met pg16
  # ---------------------------------------------------------------------------
  pgvector:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: librechat-pgvector
    restart: unless-stopped
    volumes:
      - /opt/librechat/data/pgvector:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U librechat -d librechat_rag"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    profiles:
      - rag
      - admin
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  RAG API - Document indexering en retrieval via LangChain + FastAPI
  #  Embeddings via LiteLLM gateway
  #  Registry: registry.librechat.ai (officieel)
  # ---------------------------------------------------------------------------
  rag-api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: librechat-rag-api
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - /opt/librechat/uploads:/uploads
    environment:
      # PostgreSQL verbinding
      DB_HOST: pgvector
      DB_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      # Upload map (shared met librechat)
      RAG_UPLOAD_DIR: /uploads

      # Embeddings via LiteLLM
      EMBEDDINGS_PROVIDER: openai
      EMBEDDINGS_MODEL: text-embedding-3-small
      OPENAI_API_BASE: ${LITELLM_URL}/v1
      OPENAI_API_KEY: ${LITELLM_API_KEY}

      # Chunk instellingen
      CHUNK_SIZE: "1500"
      CHUNK_OVERLAP: "100"
      RAG_TOP_K: "4"
    profiles:
      - rag
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  LibreChat Admin Panel - Officieel beheerportaal (ClickHouse)
  #  https://github.com/ClickHouse/librechat-admin-panel
  #  VITE_API_BASE_URL moet de publieke URL zijn (browser moet het bereiken)
  # ---------------------------------------------------------------------------
  admin-panel:
    image: ghcr.io/clickhouse/librechat-admin-panel:latest
    container_name: librechat-admin-panel
    restart: unless-stopped
    ports:
      - "${ADMIN_PANEL_PORT:-3100}:3000"
    depends_on:
      - librechat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      VITE_API_BASE_URL: ${PUBLIC_BASE_URL}
      API_SERVER_URL: http://librechat:3080
      ADMIN_SSO_ONLY: "${ADMIN_SSO_ONLY:-false}"
      PORT: "3000"
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  GovChat Overlay Admin
  #  Publiceert help/apps/loader/css naar gedeelde overlay-map.
  #  Let op: gebruikt LibreChat-specifieke defaults via bind mount.
  # ---------------------------------------------------------------------------
  govchat-overlay-admin:
    build:
      context: ../GovChat-AdminOverlay/admin
      dockerfile: Dockerfile
    image: govchat-overlay-admin:local
    container_name: govchat-overlay-admin
    restart: unless-stopped
    ports:
      - "${GOVCHAT_OVERLAY_ADMIN_PORT:-3002}:3002"
    environment:
      - ADMIN_PASSWORD=${GOVCHAT_ADMIN_PASSWORD}
      - CORS_ORIGIN=${GOVCHAT_OVERLAY_CORS_ORIGIN}
      - DATA_DIR=/data
      - PUBLISH_DIR=/publish
    volumes:
      - /opt/librechat/overlay/data:/data
      - /opt/librechat/overlay/publish:/publish
      - ./overlay/defaults:/app/defaults:ro
    depends_on:
      - librechat-proxy
    networks:
      - librechat-net

  # ---------------------------------------------------------------------------
  #  PgAdmin - Beheerinterface voor pgvector database
  #  Optioneel: start met  docker compose --profile admin up -d
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: librechat-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5051}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - /opt/librechat/data/pgadmin:/var/lib/pgadmin
    depends_on:
      pgvector:
        condition: service_healthy
    profiles:
      - admin
    networks:
      - librechat-net

networks:
  librechat-net:
    name: librechat-net
    driver: bridge

volumes:
  n8n-data:
  n8n-postgres-data:
