# LiteLLM config-file route (Route A)
#
# Gebruik deze file als je modellen declaratief via Git wilt beheren.
# Je kunt deze route combineren met de LiteLLM UI, maar voor voorspelbaar
# gedrag in productie wordt één primaire route aanbevolen.

model_list:
  - model_name: gpt-4o-transcribe
    litellm_params:
      model: azure/gpt-4o-transcribe
      api_base: os.environ/AZURE_OPENAI_STT_API_BASE
      api_version: os.environ/AZURE_OPENAI_STT_API_VERSION
      api_key: os.environ/AZURE_OPENAI_STT_API_KEY
    model_info:
      mode: audio_transcription

  # Optional second STT route to avoid lock-in.
  # Configure these env vars and switch the transcript app config `litellm_model`
  # to `stt-next` in the Admin panel when you want to use the new provider/model.
  - model_name: stt-next
    litellm_params:
      model: os.environ/LITELLM_STT_NEXT_MODEL
      api_base: os.environ/LITELLM_STT_NEXT_API_BASE
      api_version: os.environ/LITELLM_STT_NEXT_API_VERSION
      api_key: os.environ/LITELLM_STT_NEXT_API_KEY
    model_info:
      mode: audio_transcription

  - model_name: govchat-embedding
    litellm_params:
      model: azure/text-embedding-3-large
      api_base: os.environ/AZURE_OPENAI_API_BASE
      api_version: os.environ/AZURE_OPENAI_API_VERSION
      api_key: os.environ/AZURE_OPENAI_API_KEY

  - model_name: gpt-5.4
    litellm_params:
      model: azure/gpt-5.4
      api_base: os.environ/AZURE_OPENAI_API_BASE
      api_version: os.environ/AZURE_OPENAI_API_VERSION
      api_key: os.environ/AZURE_OPENAI_API_KEY

  - model_name: govchat-default
    litellm_params:
      model: azure/gpt-5.4
      api_base: os.environ/AZURE_OPENAI_API_BASE
      api_version: os.environ/AZURE_OPENAI_API_VERSION
      api_key: os.environ/AZURE_OPENAI_API_KEY

  - model_name: govchat-versimpelaar
    litellm_params:
      model: azure/gpt-5.4
      api_base: os.environ/AZURE_OPENAI_API_BASE
      api_version: os.environ/AZURE_OPENAI_API_VERSION
      api_key: os.environ/AZURE_OPENAI_API_KEY

# Optioneel: als je model aliases in n8n wilt afdwingen, kies daar in de
# OpenAI Chat Model node exact één van bovenstaande `model_name` waarden.
